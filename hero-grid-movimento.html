<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Vanessenceweb — Hero Grid em Movimento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ==========================================================
   DESIGN TOKENS — Vanessenceweb
   ========================================================== */
:root {
  --page-bg: #0d0c0a;
  --ink: #f5f1e8;
  --ink-muted: rgba(245, 241, 232, 0.65);
  --primary: #1a1815;
  --accent: #d4a942;           /* dourado */
  --accent-hover: #e8c05e;

  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;

  /* Controles do efeito — mexa aqui, não no CSS lá embaixo */
  --grid-angle: 15deg;         /* inclinação do grid */
  --grid-scale: 1.6;           /* zoom pra cobrir os cantos após rotacionar */
  --tile-h: 16rem;             /* altura das imagens */
  --tile-w: 20rem;             /* largura das imagens normais */
  --tile-w-long: 32rem;        /* largura das imagens longas */
  --gap: 1.25rem;              /* espaço entre imagens */
  --veil: rgba(13, 12, 10, 0.72); /* escurecimento sobre o grid */
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--page-bg);
  color: var(--ink);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}

/* ==========================================================
   HERO
   ========================================================== */
.hero {
  position: relative;
  height: 100vh;
  height: 100svh;
  overflow: hidden;
  isolation: isolate; /* cria contexto pros z-index internos */
}

/* ---------- Fundo: grid rotacionado ---------- */
.hero__bg {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: var(--gap);
  transform: rotate(var(--grid-angle)) scale(var(--grid-scale));
  z-index: -2;
}

/* Cada fileira = uma esteira infinita */
.hero__track {
  display: flex;
  gap: var(--gap);
  width: max-content;
  animation: hero-marquee var(--speed, 60s) linear infinite;
}

/* Fileiras alternadas andam pro outro lado */
.hero__track--reverse { animation-direction: reverse; }

/* O truque do loop: o conteúdo é DUPLICADO dentro da track,
   então quando ela anda -50% o segundo grupo está exatamente
   onde o primeiro começou → loop perfeito, sem "pulo". */
@keyframes hero-marquee {
  to { transform: translateX(calc(-50% - (var(--gap) / 2))); }
}

/* Grupo de imagens (existe 2x idêntico dentro de cada track) */
.hero__group {
  display: flex;
  gap: var(--gap);
  flex-shrink: 0;
}

.hero__tile {
  width: var(--tile-w);
  height: var(--tile-h);
  flex-shrink: 0;
  border-radius: 0.5rem;
  background-size: cover;
  background-position: center;
  background-color: var(--primary); /* fallback enquanto carrega */
}

.hero__tile--long { width: var(--tile-w-long); }

/* ---------- Véu de contraste ---------- */
.hero__veil {
  position: absolute;
  inset: 0;
  z-index: -1;
  background:
    radial-gradient(ellipse 70% 60% at 50% 50%, var(--veil) 0%, rgba(13,12,10,0.88) 100%);
}

/* ---------- Conteúdo central ---------- */
.hero__content {
  position: relative;
  height: 100%;
  max-width: 70rem;
  margin: 0 auto;
  padding: 2.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 2rem;
}

.hero__logo {
  position: absolute;
  top: 2.5rem;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.25rem;
  letter-spacing: 0.02em;
  color: var(--ink);
  text-decoration: none;
}

.hero__logo span { color: var(--accent); }

.hero__title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(2.5rem, 6.5vw, 5.5rem);
  line-height: 1.05;
  letter-spacing: -0.02em;
  max-width: 16ch;
}

.hero__subtitle {
  font-size: clamp(1rem, 1.4vw, 1.15rem);
  color: var(--ink-muted);
  max-width: 44ch;
  line-height: 1.6;
}

.hero__cta {
  display: inline-block;
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 1rem;
  color: var(--primary);
  background: var(--accent);
  padding: 1rem 2.5rem;
  border-radius: 100vmax;
  text-decoration: none;
  transition: background 0.25s ease, transform 0.25s ease;
}

.hero__cta:hover {
  background: var(--accent-hover);
  transform: translateY(-2px);
}

.hero__cta:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 4px;
}

.hero__footer {
  position: absolute;
  bottom: 2.5rem;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.85rem;
  color: var(--ink-muted);
  white-space: nowrap;
}

/* ---------- Acessibilidade / performance ---------- */
@media (prefers-reduced-motion: reduce) {
  .hero__track { animation: none; }
}

/* Mobile: menos fileiras visíveis, tiles menores */
@media (max-width: 767px) {
  :root {
    --tile-h: 10rem;
    --tile-w: 12rem;
    --tile-w-long: 19rem;
    --gap: 0.75rem;
    --grid-scale: 2;
  }
}
</style>
</head>
